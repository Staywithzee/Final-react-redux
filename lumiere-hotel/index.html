<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumière Hotel — Luxury Redefined</title>
    <meta name="description" content="Lumière Hotel — Where timeless elegance meets modern refinement. Book your stay in our collection of luxury rooms and suites." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #FAF7F2;
        --cream-dark: #F2EDE4;
        --warm-white: #FDFBF8;
        --gold: #C9A96E;
        --gold-dark: #A07840;
        --charcoal: #2C2820;
        --charcoal-mid: #4A4238;
        --text-muted: #9C8E7E;
        --border: rgba(201, 169, 110, 0.2);
        --shadow: 0 4px 32px rgba(44, 40, 32, 0.08);
        --radius: 2px;
        --font-display: 'Cormorant Garamond', serif;
        --font-body: 'Jost', sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-body);
        background: var(--warm-white);
        color: var(--charcoal);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      img {
        max-width: 100%;
      }

      button {
        font-family: var(--font-body);
      }

      input, textarea, select {
        font-family: var(--font-body);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
